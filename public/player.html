<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlazeZonePlayer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e5e5e5; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; height: 100vh; }
  #player-wrap { position: relative; width: 100vw; height: 100vh; background: #000; }
  video { width: 100%; height: 100%; object-fit: contain; }
  .controls-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85)); padding: 24px 20px 16px; opacity: 0; transition: opacity 0.3s; }
  #player-wrap:hover .controls-overlay { opacity: 1; }
  .back-btn { position: absolute; top: 16px; left: 16px; z-index: 10; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px 16px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 14px; transition: all 0.2s; opacity: 0; }
  #player-wrap:hover .back-btn { opacity: 1; }
  .back-btn:hover { background: rgba(255,255,255,0.1); }
  .loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
  .spinner { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #e50914; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; }
  .error-box h2 { font-size: 20px; margin-bottom: 8px; }
  .error-box p { color: #888; font-size: 14px; margin-bottom: 16px; }
  .retry-btn { background: #e50914; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .retry-btn:hover { background: #f40612; }
  .title-bar { position: absolute; top: 16px; left: 70px; z-index: 10; color: #fff; font-size: 16px; font-weight: 600; opacity: 0; transition: opacity 0.3s; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
  #player-wrap:hover .title-bar { opacity: 1; }
</style>
</head>
<body>
<div id="player-wrap">
  <div style="position:absolute;top:16px;left:16px;right:16px;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;opacity:0;transition:opacity 0.3s;" id="top-bar" onmouseenter="this.style.opacity='1'" onmouseleave="if(!document.querySelector('#player-wrap:hover'))this.style.opacity='0'">
    <button class="back-btn" onclick="goBack()" style="position:static;opacity:1;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </button>
    <div class="flex items-center gap-2" id="top-actions">
      <a id="download-btn" href="#" download="video.mp4" style="display:none;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:8px 16px;color:#fff;cursor:pointer;align-items:center;gap:6px;font-size:14px;text-decoration:none;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">
        ⬇ Download
      </a>
    </div>
  </div>
  <div class="title-bar" id="title-bar"></div>
  <div class="loader" id="loader"><div class="spinner"></div></div>
  <div class="error-box" id="error-box" style="display:none">
    <h2>Stream Error</h2>
    <p id="error-msg">Could not load blazezone</p>
    <button class="retry-btn" onclick="loadStream()">Retry</button>
  </div>
  <video id="video" controls autoplay playsinline></video>
</div>

<script>
const video = document.getElementById('video');
const loader = document.getElementById('loader');
const errorBox = document.getElementById('error-box');
const errorMsg = document.getElementById('error-msg');
const titleBar = document.getElementById('title-bar');

// ── Config ──
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3002'
  : 'https://keith-switching-meaning-calculate.trycloudflare.com';

const params = new URLSearchParams(window.location.search);
const streamUrl = params.get('url');
const referer = params.get('referer') || 'https://cloudorchestranova.com/';
const title = params.get('title') || '';
const dlBtn = document.getElementById('download-btn');

// Set download link
if (dlBtn && streamUrl) {
  dlBtn.href = `${API_BASE}/api/download?url=${encodeURIComponent(streamUrl)}&title=${encodeURIComponent(title)}`;
  dlBtn.style.display = 'inline-flex';
}

titleBar.textContent = decodeURIComponent(title);

function goBack() {
  if (window.history.length > 1) window.history.back();
  else window.close();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') goBack();
  if (e.key === ' ' || e.key === 'k') { e.preventDefault(); video.paused ? video.play() : video.pause(); }
  if (e.key === 'ArrowLeft') video.currentTime -= 10;
  if (e.key === 'ArrowRight') video.currentTime += 10;
  if (e.key === 'f') {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.getElementById('player-wrap').requestFullscreen();
  }
  if (e.key === 'm') video.muted = !video.muted;
});

function showError(msg) {
  loader.style.display = 'none';
  errorBox.style.display = 'block';
  errorMsg.textContent = msg;
}

function loadStream() {
  if (!streamUrl) { showError('No stream URL provided'); return; }
  loader.style.display = 'block';
  errorBox.style.display = 'none';

  const decoded = decodeURIComponent(streamUrl);

  if (Hls.isSupported()) {
    const hls = new Hls({
      xhrSetup: (xhr, url) => {
        // We can't set Referer via JS on HLS requests in most browsers
        // The proxy approach handles this server-side
      },
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
    });
    hls.loadSource(decoded);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { loader.style.display = 'none'; video.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          // Try recoverable
          hls.startLoad();
        } else {
          showError('Playback error: ' + data.details);
        }
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Native HLS (Safari)
    video.src = decoded;
    video.addEventListener('loadedmetadata', () => { loader.style.display = 'none'; video.play().catch(()=>{}); });
    video.addEventListener('error', () => showError('Playback failed'));
  } else {
    showError('HLS not supported in this browser');
  }
}

loadStream();
</script>
</body>
</html>
