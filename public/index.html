<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlazeZone- Movies & Anime</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        dark: { 900: '#0a0a0f', 800: '#111118', 700: '#1a1a24', 600: '#22222e', 500: '#2a2a38' },
        accent: { DEFAULT: '#e50914', light: '#ff1a25', dark: '#b20710' },
        anime: { DEFAULT: '#7c3aed', light: '#8b5cf6' }
      }
    }
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e5e5e5; font-family: system-ui, -apple-system, sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  .scroll-row { scroll-behavior: smooth; -ms-overflow-style: none; scrollbar-width: none; }
  .scroll-row::-webkit-scrollbar { display: none; }

  .card { transition: transform 0.25s ease, box-shadow 0.25s ease; cursor: pointer; }
  .card:hover { transform: scale(1.08); z-index: 10; box-shadow: 0 8px 30px rgba(0,0,0,0.7); }

  .hero-gradient { background: linear-gradient(to right, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.7) 40%, transparent 70%), linear-gradient(to top, #0a0a0f 0%, transparent 40%); }

  .fade-in { animation: fadeIn 0.5s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .search-glow { box-shadow: 0 0 0 1px rgba(229,9,20,0.3); }
  .search-glow:focus-within { box-shadow: 0 0 0 2px rgba(229,9,20,0.6), 0 0 20px rgba(229,9,20,0.15); }

  .chip { transition: all 0.2s; }
  .chip.active { background: #e50914; color: #fff; border-color: #e50914; }
  .chip:hover { border-color: #e50914; color: #fff; }

  .modal-overlay { backdrop-filter: blur(4px); }
  .modal-content { animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

  .episode-card { transition: all 0.2s; }
  .episode-card:hover { background: #2a2a38; transform: translateX(4px); }

  .shimmer { background: linear-gradient(90deg, #111118 25%, #1a1a24 50%, #111118 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .nav-blur { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

  #toast { transition: all 0.3s ease; }
</style>
</head>
<body class="min-h-screen">

<!-- Toast notification -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] bg-dark-700 border border-white/10 px-5 py-3 rounded-xl text-sm flex items-center gap-2 opacity-0 pointer-events-none translate-y-4">
  <span id="toast-icon"></span><span id="toast-msg"></span>
</div>

<!-- Navigation -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 nav-blur bg-[#0a0a0f]/80 border-b border-white/5 transition-all duration-300">
  <div class="max-w-[1440px] mx-auto px-4 md:px-8 h-16 flex items-center gap-6">
    <!-- Logo -->
    <div class="flex items-center gap-2 shrink-0 cursor-pointer" onclick="goHome()">
      <div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
      <span class="text-lg font-bold text-white tracking-tight hidden sm:block">Blaze<span class="text-accent">Zone</span></span>
    </div>

    <!-- Nav links -->
    <div class="hidden md:flex items-center gap-1 text-sm">
      <button onclick="goHome()" class="px-3 py-1.5 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition">Home</button>
      <button onclick="showGenreSection()" class="px-3 py-1.5 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition">Movies</button>
      <button onclick="loadTopAnimeSection()" class="px-3 py-1.5 rounded-lg text-white/70 hover:text-white hover:bg-white/5 transition">Anime</button>
    </div>

    <!-- Search -->
    <div class="flex-1 max-w-lg ml-auto">
      <div class="search-glow flex items-center bg-dark-800 rounded-xl px-4 py-2.5 transition-all">
        <i data-lucide="search" class="w-4 h-4 text-white/40 shrink-0"></i>
        <input id="search-input" type="text" placeholder="Search movies & anime..."
          class="flex-1 bg-transparent text-sm text-white placeholder-white/40 outline-none ml-3"
          oninput="debounceSearch()" onkeydown="if(event.key==='Escape')clearSearch()">
        <button id="search-clear" onclick="clearSearch()" class="hidden ml-2 text-white/40 hover:text-white">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Search Results Dropdown -->
<div id="search-results" class="fixed top-16 left-0 right-0 z-40 hidden">
  <div class="max-w-[1440px] mx-auto px-4 md:px-8">
    <div class="bg-dark-800 border border-white/10 rounded-2xl mt-2 max-h-[70vh] overflow-y-auto shadow-2xl">
      <div id="search-content" class="p-4"></div>
    </div>
  </div>
</div>

<!-- Main Content -->
<main id="main-content" class="pt-16">
  <!-- Hero Section -->
  <section id="hero-section" class="relative h-[70vh] min-h-[480px] overflow-hidden">
    <div id="hero-bg" class="absolute inset-0 bg-cover bg-center transition-all duration-700"></div>
    <div class="hero-gradient absolute inset-0"></div>
    <div class="relative h-full max-w-[1440px] mx-auto px-4 md:px-8 flex items-end pb-16">
      <div class="max-w-xl fade-in">
        <div id="hero-badge" class="inline-flex items-center gap-1.5 bg-accent/20 text-accent text-xs font-semibold px-3 py-1 rounded-full mb-4 border border-accent/30"></div>
        <h1 id="hero-title" class="text-4xl md:text-5xl font-extrabold text-white leading-tight mb-3"></h1>
        <p id="hero-desc" class="text-white/60 text-sm md:text-base leading-relaxed mb-6 line-clamp-3"></p>
        <div class="flex items-center gap-3">
          <button id="hero-play-btn" class="flex items-center gap-2 bg-white text-black font-semibold px-6 py-3 rounded-xl hover:bg-white/90 transition text-sm">
            <i data-lucide="play" class="w-5 h-5 fill-current"></i> Play
          </button>
          <button id="hero-info-btn" class="flex items-center gap-2 bg-white/10 text-white font-medium px-6 py-3 rounded-xl hover:bg-white/20 transition text-sm border border-white/10">
            <i data-lucide="info" class="w-5 h-5"></i> More Info
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Genre Chips -->
  <section id="genre-section" class="max-w-[1440px] mx-auto px-4 md:px-8 -mt-8 mb-8 relative z-10">
    <div class="flex items-center gap-2 overflow-x-auto scroll-row pb-2">
      <button onclick="filterGenre(null)" class="chip active shrink-0 px-4 py-2 rounded-full text-xs font-medium border border-white/10 bg-dark-700 text-white/70">All</button>
    </div>
  </section>

  <!-- Content Rows -->
  <div id="content-rows" class="max-w-[1440px] mx-auto px-4 md:px-8 space-y-10 pb-20">
    <!-- Trending Movies -->
    <section>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-white flex items-center gap-2">
          <i data-lucide="flame" class="w-5 h-5 text-accent"></i> Trending Movies
        </h2>
        <button onclick="showAllMovies('trending')" class="text-xs text-white/40 hover:text-white transition">View All →</button>
      </div>
      <div id="trending-row" class="flex gap-3 overflow-x-auto scroll-row pb-4"></div>
    </section>

    <!-- Top Anime -->
    <section>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-white flex items-center gap-2">
          <i data-lucide="sparkles" class="w-5 h-5 text-anime"></i> Top Anime
        </h2>
        <button onclick="showAllAnime()" class="text-xs text-white/40 hover:text-white transition">View All →</button>
      </div>
      <div id="anime-row" class="flex gap-3 overflow-x-auto scroll-row pb-4"></div>
    </section>

    <!-- Now Playing -->
    <section>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-white flex items-center gap-2">
          <i data-lucide="film" class="w-5 h-5 text-blue-400"></i> Now Playing
        </h2>
      </div>
      <div id="nowplaying-row" class="flex gap-3 overflow-x-auto scroll-row pb-4"></div>
    </section>

    <!-- Upcoming Anime -->
    <section>
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-white flex items-center gap-2">
          <i data-lucide="clock" class="w-5 h-5 text-yellow-400"></i> Upcoming Anime
        </h2>
      </div>
      <div id="upcoming-anime-row" class="flex gap-3 overflow-x-auto scroll-row pb-4"></div>
    </section>

    <!-- Genre-filtered Movies -->
    <section id="genre-movies-section" class="hidden">
      <div class="flex items-center justify-between mb-4">
        <h2 id="genre-movies-title" class="text-lg font-bold text-white flex items-center gap-2">
          <i data-lucide="clapperboard" class="w-5 h-5 text-accent"></i> <span>Genre Movies</span>
        </h2>
      </div>
      <div id="genre-movies-row" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3"></div>
    </section>
  </div>
</main>

<!-- Movie Detail Modal -->
<div id="movie-modal" class="fixed inset-0 z-[100] hidden">
  <div class="modal-overlay absolute inset-0 bg-black/70" onclick="closeModal()"></div>
  <div class="modal-content absolute inset-x-0 bottom-0 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:max-w-2xl md:w-full md:rounded-2xl bg-dark-800 border border-white/10 max-h-[85vh] overflow-y-auto">
    <div id="modal-hero" class="relative h-56 md:h-64 bg-cover bg-center">
      <div class="absolute inset-0 bg-gradient-to-t from-dark-800 via-dark-800/50 to-transparent"></div>
      <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 hover:bg-black/70 rounded-full p-2 transition">
        <i data-lucide="x" class="w-5 h-5 text-white"></i>
      </button>
    </div>
    <div class="p-6 -mt-16 relative">
      <h2 id="modal-title" class="text-2xl font-bold text-white mb-2"></h2>
      <div id="modal-meta" class="flex items-center gap-3 text-sm text-white/50 mb-4 flex-wrap"></div>
      <p id="modal-desc" class="text-white/60 text-sm leading-relaxed mb-6"></p>
      <div id="modal-actions" class="flex items-center gap-3"></div>
      <!-- Episodes section (for anime) -->
      <div id="modal-episodes" class="mt-6 hidden">
        <h3 class="text-base font-semibold text-white mb-3 flex items-center gap-2">
          <i data-lucide="list" class="w-4 h-4"></i> Episodes
        </h3>
        <div id="episode-list" class="space-y-2 max-h-64 overflow-y-auto pr-2"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const TMDB_KEY = '484366b7235bc8db84aba0f9e3b1bec6';
const TMDB_IMG = 'https://image.tmdb.org/t/p/';
// Backend API (server.js) - change this to your deployed backend URL
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3002'
  : 'https://blazezone-api.up.railway.app'; // TODO: set your deployed backend URL
const GENRES = [
  {id:28,name:'Action'},{id:12,name:'Adventure'},{id:16,name:'Animation'},{id:35,name:'Comedy'},
  {id:80,name:'Crime'},{id:99,name:'Documentary'},{id:18,name:'Drama'},{id:10751,name:'Family'},
  {id:14,name:'Fantasy'},{id:36,name:'History'},{id:27,name:'Horror'},{id:10402,name:'Music'},
  {id:9648,name:'Mystery'},{id:10749,name:'Romance'},{id:878,name:'Sci-Fi'},{id:10770,name:'TV Movie'},
  {id:53,name:'Thriller'},{id:10752,name:'War'},{id:37,name:'Western'}
];

// ===== STATE =====
let heroMovie = null;
let heroIdx = 0;
let allTrending = [];
let allNowPlaying = [];
let currentGenre = null;
let searchTimeout = null;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  buildGenreChips();
  loadHero();
  loadTrending();
  loadTopAnime();
  loadNowPlaying();
  loadUpcomingAnime();
});

// ===== GENRE CHIPS =====
function buildGenreChips() {
  const row = document.querySelector('#genre-section .flex');
  GENRES.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'chip shrink-0 px-4 py-2 rounded-full text-xs font-medium border border-white/10 bg-dark-700 text-white/70';
    btn.textContent = g.name;
    btn.onclick = () => filterGenre(g.id);
    btn.dataset.genre = g.id;
    row.appendChild(btn);
  });
}

function filterGenre(id) {
  currentGenre = id;
  document.querySelectorAll('.chip').forEach(c => {
    if (id === null && !c.dataset.genre) c.classList.add('active');
    else if (c.dataset.genre == id) c.classList.add('active');
    else c.classList.remove('active');
  });
  const section = document.getElementById('genre-movies-section');
  if (id === null) {
    section.classList.add('hidden');
    return;
  }
  section.classList.remove('hidden');
  const genre = GENRES.find(g => g.id === id);
  document.querySelector('#genre-movies-title span').textContent = genre ? genre.name + ' Movies' : 'Movies';
  loadGenreMovies(id);
}

async function loadGenreMovies(genreId) {
  const row = document.getElementById('genre-movies-row');
  row.innerHTML = shimmerCards(6);
  try {
    const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_KEY}&with_genres=${genreId}&sort_by=popularity.desc&per_page=12`);
    const data = await res.json();
    row.innerHTML = '';
    data.results.slice(0, 18).forEach(m => row.appendChild(makeMovieCard(m)));
  } catch(e) { row.innerHTML = '<p class="text-white/40 text-sm col-span-full">Failed to load</p>'; }
}

// ===== TMDB FETCHES =====
async function loadHero() {
  try {
    const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_KEY}`);
    const data = await res.json();
    allTrending = data.results;
    cycleHero();
  } catch(e) { console.error('Hero load failed', e); }
}

function cycleHero() {
  if (!allTrending.length) return;
  heroMovie = allTrending[heroIdx % allTrending.length];
  heroIdx++;
  const bg = document.getElementById('hero-bg');
  bg.style.backgroundImage = `url(${TMDB_IMG}w1280${heroMovie.backdrop_path || heroMovie.poster_path})`;
  document.getElementById('hero-title').textContent = heroMovie.title || heroMovie.name;
  document.getElementById('hero-desc').textContent = heroMovie.overview || '';
  const year = (heroMovie.release_date || '').slice(0, 4);
  const rating = heroMovie.vote_average ? heroMovie.vote_average.toFixed(1) : '';
  document.getElementById('hero-badge').innerHTML = `⭐ ${rating} ${year ? '· ' + year : ''}`;
  document.getElementById('hero-play-btn').onclick = () => playMovie(heroMovie);
  document.getElementById('hero-info-btn').onclick = () => showMovieDetail(heroMovie);
  lucide.createIcons();
}

// Rotate hero every 8s
setInterval(cycleHero, 8000);

async function loadTrending() {
  const row = document.getElementById('trending-row');
  row.innerHTML = shimmerCards(8);
  try {
    const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_KEY}`);
    const data = await res.json();
    row.innerHTML = '';
    data.results.forEach(m => row.appendChild(makeMovieCard(m)));
  } catch(e) { row.innerHTML = '<p class="text-white/40 text-sm">Failed to load trending</p>'; }
}

async function loadNowPlaying() {
  const row = document.getElementById('nowplaying-row');
  row.innerHTML = shimmerCards(8);
  try {
    const res = await fetch(`https://api.themoviedb.org/3/movie/now_playing?api_key=${TMDB_KEY}&per_page=20`);
    const data = await res.json();
    allNowPlaying = data.results;
    row.innerHTML = '';
    data.results.forEach(m => row.appendChild(makeMovieCard(m)));
  } catch(e) { row.innerHTML = '<p class="text-white/40 text-sm">Failed to load</p>'; }
}

// ===== ANIME FETCHES =====
async function loadTopAnime() {
  const row = document.getElementById('anime-row');
  row.innerHTML = shimmerCards(8);
  try {
    const res = await fetch('https://api.jikan.moe/v4/top/anime?filter=bypopularity&limit=20');
    const data = await res.json();
    row.innerHTML = '';
    data.data.forEach(a => row.appendChild(makeAnimeCard(a)));
  } catch(e) { row.innerHTML = '<p class="text-white/40 text-sm">Failed to load anime</p>'; }
}

async function loadUpcomingAnime() {
  const row = document.getElementById('upcoming-anime-row');
  row.innerHTML = shimmerCards(8);
  try {
    const res = await fetch('https://api.jikan.moe/v4/top/anime?filter=upcoming&limit=20');
    const data = await res.json();
    row.innerHTML = '';
    data.data.forEach(a => row.appendChild(makeAnimeCard(a)));
  } catch(e) { row.innerHTML = '<p class="text-white/40 text-sm">Failed to load</p>'; }
}

// ===== CARD BUILDERS =====
function makeMovieCard(m) {
  const card = document.createElement('div');
  card.className = 'card shrink-0 w-[150px] md:w-[180px]';
  const poster = m.poster_path ? `${TMDB_IMG}w500${m.poster_path}` : '';
  const year = (m.release_date || '').slice(0, 4);
  const rating = m.vote_average ? m.vote_average.toFixed(1) : 'N/A';
  card.innerHTML = `
    <div class="relative rounded-xl overflow-hidden bg-dark-700 aspect-[2/3] mb-2">
      ${poster ? `<img src="${poster}" alt="${m.title||''}" class="w-full h-full object-cover" loading="lazy">` : `<div class="w-full h-full flex items-center justify-center text-white/20"><i data-lucide="film" class="w-8 h-8"></i></div>`}
      <div class="absolute top-2 right-2 bg-black/70 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-0.5 rounded-md flex items-center gap-1">
        ⭐ ${rating}
      </div>
      <div class="absolute inset-0 bg-black/0 hover:bg-black/40 transition flex items-center justify-center opacity-0 hover:opacity-100">
        <div class="bg-white/20 backdrop-blur-sm rounded-full p-3"><i data-lucide="play" class="w-6 h-6 text-white fill-white"></i></div>
      </div>
    </div>
    <p class="text-xs text-white/80 font-medium truncate">${m.title || ''}</p>
    <p class="text-[10px] text-white/40">${year}</p>`;
  card.onclick = () => showMovieDetail(m);
  return card;
}

function makeAnimeCard(a) {
  const card = document.createElement('div');
  card.className = 'card shrink-0 w-[150px] md:w-[180px]';
  const img = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
  const score = a.score ? a.score.toFixed(1) : 'N/A';
  card.innerHTML = `
    <div class="relative rounded-xl overflow-hidden bg-dark-700 aspect-[2/3] mb-2">
      ${img ? `<img src="${img}" alt="${a.title||''}" class="w-full h-full object-cover" loading="lazy">` : `<div class="w-full h-full flex items-center justify-center text-white/20"><i data-lucide="tv" class="w-8 h-8"></i></div>`}
      <div class="absolute top-2 right-2 bg-black/70 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-0.5 rounded-md flex items-center gap-1">
        ⭐ ${score}
      </div>
      <div class="absolute bottom-2 left-2 bg-anime/80 backdrop-blur-sm text-white text-[10px] font-bold px-2 py-0.5 rounded-md">
        ${a.type || 'TV'}
      </div>
      <div class="absolute inset-0 bg-black/0 hover:bg-black/40 transition flex items-center justify-center opacity-0 hover:opacity-100">
        <div class="bg-anime/30 backdrop-blur-sm rounded-full p-3"><i data-lucide="play" class="w-6 h-6 text-white fill-white"></i></div>
      </div>
    </div>
    <p class="text-xs text-white/80 font-medium truncate">${a.title || ''}</p>
    <p class="text-[10px] text-white/40">${a.aired?.string ? a.aired.string.split('to')[0].trim() : ''}</p>`;
  card.onclick = () => showAnimeDetail(a);
  return card;
}

function shimmerCards(n) {
  let html = '';
  for (let i = 0; i < n; i++) {
    html += `<div class="shrink-0 w-[150px] md:w-[180px]"><div class="shimmer rounded-xl aspect-[2/3] mb-2"></div><div class="shimmer h-3 w-3/4 rounded mb-1"></div><div class="shimmer h-2 w-1/2 rounded"></div></div>`;
  }
  return html;
}

// ===== MOVIE DETAIL MODAL =====
function showMovieDetail(m) {
  const modal = document.getElementById('movie-modal');
  const hero = document.getElementById('modal-hero');
  hero.style.backgroundImage = `url(${TMDB_IMG}w1280${m.backdrop_path || m.poster_path || ''})`;
  document.getElementById('modal-title').textContent = m.title || m.name || '';
  const year = (m.release_date || '').slice(0, 4);
  const rating = m.vote_average ? m.vote_average.toFixed(1) : '';
  const runtime = m.runtime ? `${m.runtime}m` : '';
  document.getElementById('modal-meta').innerHTML = `
    ${rating ? `<span class="text-yellow-400 font-semibold">⭐ ${rating}</span>` : ''}
    ${year ? `<span>${year}</span>` : ''}
    ${runtime ? `<span>${runtime}</span>` : ''}
    <span class="px-1.5 py-0.5 bg-white/10 rounded text-[10px]">Movie</span>`;
  document.getElementById('modal-desc').textContent = m.overview || 'No description available.';
  document.getElementById('modal-actions').innerHTML = `
    <button onclick="playMovie(movieModalData)" class="flex items-center gap-2 bg-white text-black font-semibold px-6 py-2.5 rounded-xl hover:bg-white/90 transition text-sm">
      <i data-lucide="play" class="w-4 h-4 fill-current"></i> Play
    </button>`;
  document.getElementById('modal-episodes').classList.add('hidden');
  modal.classList.remove('hidden');
  window.movieModalData = m;
  lucide.createIcons();
  document.body.style.overflow = 'hidden';
}

function showAnimeDetail(a) {
  const modal = document.getElementById('movie-modal');
  const hero = document.getElementById('modal-hero');
  const img = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
  hero.style.backgroundImage = `url(${img})`;
  document.getElementById('modal-title').textContent = a.title || '';
  document.getElementById('modal-meta').innerHTML = `
    ${a.score ? `<span class="text-anime-light font-semibold">⭐ ${a.score.toFixed(1)}</span>` : ''}
    <span>${a.type || 'TV'}</span>
    ${a.episodes ? `<span>${a.episodes} eps</span>` : ''}
    <span class="px-1.5 py-0.5 bg-anime/20 text-anime-light rounded text-[10px]">Anime</span>`;
  document.getElementById('modal-desc').textContent = a.synopsis || 'No description available.';
  document.getElementById('modal-actions').innerHTML = `
    <button onclick="playAnimeFirstEp(animeModalData)" class="flex items-center gap-2 bg-anime text-white font-semibold px-6 py-2.5 rounded-xl hover:bg-anime-light transition text-sm">
      <i data-lucide="play" class="w-4 h-4 fill-current"></i> Play Episode 1
    </button>`;
  // Load episodes
  const epSection = document.getElementById('modal-episodes');
  epSection.classList.remove('hidden');
  loadEpisodes(a.mal_id);
  modal.classList.remove('hidden');
  window.animeModalData = a;
  lucide.createIcons();
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('movie-modal').classList.add('hidden');
  document.body.style.overflow = '';
}

async function loadEpisodes(malId) {
  const list = document.getElementById('episode-list');
  list.innerHTML = '<div class="shimmer h-8 rounded-lg"></div>'.repeat(5);
  try {
    const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}/episodes`);
    const data = await res.json();
    list.innerHTML = '';
    if (!data.data || !data.data.length) {
      list.innerHTML = '<p class="text-white/40 text-xs">No episodes found</p>';
      return;
    }
    data.data.forEach(ep => {
      const card = document.createElement('div');
      card.className = 'episode-card flex items-center gap-3 p-3 rounded-xl bg-dark-700 cursor-pointer';
      card.innerHTML = `
        <div class="shrink-0 w-8 h-8 bg-dark-500 rounded-lg flex items-center justify-center text-xs font-bold text-white/60">${ep.mal_id}</div>
        <div class="flex-1 min-w-0">
          <p class="text-xs text-white/80 font-medium truncate">${ep.title || 'Episode ' + ep.mal_id}</p>
          ${ep.aired ? `<p class="text-[10px] text-white/30 mt-0.5">${new Date(ep.aired).toLocaleDateString()}</p>` : ''}
        </div>
        <i data-lucide="play" class="w-4 h-4 text-white/30 shrink-0"></i>`;
      card.onclick = () => playAnimeEp(malId, ep.mal_id);
      list.appendChild(card);
    });
    lucide.createIcons();
  } catch(e) { list.innerHTML = '<p class="text-white/40 text-xs">Failed to load episodes</p>'; }
}

// ===== STREAMING (via server.js backend) =====
async function playMovie(m) {
  closeModal();
  const title = m.title || 'Movie';
  try {
    const res = await fetch(`${API_BASE}/api/stream?tmdb=${m.id}&type=movie`);
    const data = await res.json();
    if (data.streamUrl) {
      window.open(`player.html?url=${encodeURIComponent(data.streamUrl)}&title=${encodeURIComponent(title)}`, '_blank');
    } else {
      toast('❌', 'Failed to resolve stream');
    }
  } catch(e) {
    toast('❌', 'Backend unreachable. Using fallback.');
    showPlayer(`https://vidsrc.me/embed/movie?tmdb=${m.id}`, title);
  }
}

function playAnimeFirstEp(a) {
  playAnimeEp(a.mal_id, 1);
}

async function playAnimeEp(malId, epNum) {
  closeModal();
  const title = 'Episode ' + epNum;
  try {
    const res = await fetch(`${API_BASE}/api/stream?tmdb=${malId}&type=tv&season=1&episode=${epNum}`);
    const data = await res.json();
    if (data.streamUrl) {
      window.open(`player.html?url=${encodeURIComponent(data.streamUrl)}&title=${encodeURIComponent(title)}`, '_blank');
    } else {
      toast('❌', 'Failed to resolve stream');
    }
  } catch(e) {
    toast('❌', 'Backend unreachable. Using fallback.');
    showPlayer(`https://megaplay.buzz/stream/mal/${malId}/${epNum}/sub`, title);
  }
}


// ===== FULLSCREEN PLAYER (fallback iframe) =====
function showPlayer(url, title) {
  let modal = document.getElementById('playerModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'playerModal';
    modal.className = 'fixed inset-0 z-[100] bg-black flex flex-col';
    modal.innerHTML = `
      <div class="flex items-center justify-between px-4 py-3 bg-[#0a0a0f]">
        <span class="text-white font-semibold text-sm truncate flex-1">${title}</span>
        <button onclick="closePlayer()" class="ml-4 text-gray-400 hover:text-white transition p-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="flex-1 relative">
        <iframe id="playerFrame" src="" class="w-full h-full border-0" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
      </div>
    `;
    document.body.appendChild(modal);
  }
  document.getElementById('playerFrame').src = url;
  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closePlayer() {
  const modal = document.getElementById('playerModal');
  if (modal) {
    modal.classList.add('hidden');
    document.getElementById('playerFrame').src = '';
    document.body.style.overflow = '';
  }
}
// ===== SEARCH =====
function debounceSearch() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('search-input').value.trim();
  document.getElementById('search-clear').classList.toggle('hidden', !q);
  if (!q) { hideSearch(); return; }
  searchTimeout = setTimeout(() => doSearch(q), 350);
}

async function doSearch(q) {
  const panel = document.getElementById('search-results');
  const content = document.getElementById('search-content');
  panel.classList.remove('hidden');
  content.innerHTML = `
    <div class="flex items-center gap-3 text-white/40 text-sm py-2">
      <div class="spinner" style="width:20px;height:20px;border:2px solid rgba(255,255,255,0.1);border-top-color:#e50914;border-radius:50%;animation:spin 0.8s linear infinite"></div>
      Searching movies & anime...
    </div>`;

  // Search both in parallel
  const [movieRes, animeRes] = await Promise.allSettled([
    fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&per_page=10`).then(r=>r.json()),
    fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=8`).then(r=>r.json())
  ]);

  let html = '';
  const movies = movieRes.status === 'fulfilled' ? (movieRes.value.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv').slice(0, 8) : [];
  const anime = animeRes.status === 'fulfilled' ? (animeRes.value.data || []).slice(0, 8) : [];

  if (!movies.length && !anime.length) {
    html = '<p class="text-white/40 text-sm py-4 text-center">No results found</p>';
  } else {
    if (movies.length) {
      html += `<div class="mb-4"><p class="text-xs font-semibold text-white/40 uppercase tracking-wider mb-2">🎬 Movies & TV</p><div class="space-y-1">`;
      movies.forEach(m => {
        const poster = m.poster_path ? `${TMDB_IMG}w92${m.poster_path}` : '';
        const title = m.title || m.name || '';
        const year = (m.release_date || m.first_air_date || '').slice(0, 4);
        html += `<div class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 cursor-pointer transition" onclick="window.searchResultMovie(${m.id})">
          <div class="w-10 h-14 rounded-lg overflow-hidden bg-dark-700 shrink-0">${poster ? `<img src="${poster}" class="w-full h-full object-cover" loading="lazy">` : ''}</div>
          <div class="flex-1 min-w-0"><p class="text-sm text-white/80 truncate">${title}</p><p class="text-[10px] text-white/40">${year} · ${(m.media_type||'').toUpperCase()}</p></div>
          <span class="text-[10px] text-white/30">⭐ ${m.vote_average ? m.vote_average.toFixed(1) : 'N/A'}</span>
        </div>`;
      });
      html += `</div></div>`;
    }
    if (anime.length) {
      html += `<div><p class="text-xs font-semibold text-white/40 uppercase tracking-wider mb-2">🎌 Anime</p><div class="space-y-1">`;
      anime.forEach(a => {
        const img = a.images?.jpg?.image_url || '';
        html += `<div class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 cursor-pointer transition" onclick="window.searchResultAnime(${a.mal_id})">
          <div class="w-10 h-14 rounded-lg overflow-hidden bg-dark-700 shrink-0">${img ? `<img src="${img}" class="w-full h-full object-cover" loading="lazy">` : ''}</div>
          <div class="flex-1 min-w-0"><p class="text-sm text-white/80 truncate">${a.title}</p><p class="text-[10px] text-white/40">${a.type || 'TV'} · ${a.episodes || '?'} eps</p></div>
          <span class="text-[10px] text-white/30">⭐ ${a.score ? a.score.toFixed(1) : 'N/A'}</span>
        </div>`;
      });
      html += `</div></div>`;
    }
  }
  content.innerHTML = html;
}

function hideSearch() {
  document.getElementById('search-results').classList.add('hidden');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.add('hidden');
  hideSearch();
}

// Search result click handlers
window.searchResultMovie = async function(tmdbId) {
  clearSearch();
  try {
    const res = await fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=${TMDB_KEY}`);
    const m = await res.json();
    showMovieDetail(m);
  } catch(e) { toast('❌', 'Failed to load movie details'); }
};

window.searchResultAnime = async function(malId) {
  clearSearch();
  try {
    const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}/full`);
    const data = await res.json();
    showAnimeDetail(data.data);
  } catch(e) { toast('❌', 'Failed to load anime details'); }
};

// Close search on click outside
document.addEventListener('click', e => {
  if (!e.target.closest('#search-results') && !e.target.closest('#search-input')) hideSearch();
});

// ===== TOAST =====
function toast(icon, msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-msg').textContent = msg;
  t.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
  t.classList.add('opacity-100', 'translate-y-0');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => {
    t.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
    t.classList.remove('opacity-100', 'translate-y-0');
  }, 3500);
}

// ===== NAV SCROLL EFFECT =====
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const nav = document.getElementById('navbar');
  const y = window.scrollY;
  if (y > 100) nav.classList.add('bg-[#0a0a0f]/95');
  else nav.classList.remove('bg-[#0a0a0f]/95');
  lastScroll = y;
});
