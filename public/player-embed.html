<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BlazeZone Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:system-ui,sans-serif;overflow:hidden}
#playerWrap{position:relative;width:100%;height:100vh;display:flex;flex-direction:column}
video{width:100%;flex:1;object-fit:contain;outline:none;background:#000}
#controls{display:flex;gap:8px;padding:10px 16px;background:#111;align-items:center;flex-wrap:wrap;z-index:10}
#controls button,#controls a{padding:8px 16px;border:none;border-radius:6px;background:#e50914;color:#fff;font-weight:600;cursor:pointer;font-size:13px;text-decoration:none}
#controls button:hover,#controls a:hover{background:#ff1a25}
#status{color:#888;font-size:12px;flex:1;text-align:right}
#loader{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#666;font-size:14px}
</style>
</head>
<body>
<div id="playerWrap">
  <video id="player" controls autoplay playsinline></video>
  <div id="loader">Loading stream...</div>
  <div id="controls">
    <button onclick="togFS()">⛶ Fullscreen</button>
    <a id="dlBtn" href="#" download="video.mp4" style="display:none">⬇ Download</a>
    <span id="status">Ad-Free • BlazeZone</span>
  </div>
</div>

<script>
// Get stream params from URL
// ── Config ──
const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? 'http://localhost:3002'
  : 'https://keith-switching-meaning-calculate.trycloudflare.com';

const params = new URLSearchParams(location.search);
const streamUrl = params.get('url') || '';
const title = params.get('title') || 'video';
const player = document.getElementById('player');
const loader = document.getElementById('loader');
const dlBtn = document.getElementById('dlBtn');

if (!streamUrl) {
  loader.textContent = '❌ No stream URL provided';
} else {
  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(streamUrl);
    hls.attachMedia(player);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      loader.style.display = 'none';
      player.play();
    });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) loader.textContent = '❌ Stream error';
    });
  } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
    player.src = streamUrl;
    loader.style.display = 'none';
  }

  dlBtn.style.display = 'inline-block';
  dlBtn.href = API_BASE + '/api/download?url=' + encodeURIComponent(streamUrl) + '&title=' + encodeURIComponent(title);
}

function togFS() {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.body.requestFullscreen();
}
</script>
</body>
</html>
